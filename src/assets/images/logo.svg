<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Soft, Premium Brand Gradients -->
    <linearGradient id="cartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" /> <!-- Indigo -->
      <stop offset="100%" stop-color="#7C3AED" /> <!-- Violet -->
    </linearGradient>

    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4" /> <!-- Cyan/Speed -->
      <stop offset="100%" stop-color="#3B82F6" /> <!-- Blue -->
    </linearGradient>

    <!-- Subtle Premium Shadow for Mobile App Feel -->
    <filter id="appShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#4F46E5" flood-opacity="0.12" />
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.04" />
    </filter>
  </defs>

  <!-- Clean White Background (Perfect for iOS/Android Light Mode) -->
  <rect width="100%" height="100%" fill="#FFFFFF" />

  <g transform="translate(0, -15)">
    <!-- ICON GRAPHIC -->
    <g transform="translate(400, 230)" filter="url(#appShadow)">
      
      <!-- Ambient Back-Glow Effect (Subtle Ribbon) -->
      <path d="M-45,-75 C-15,-95 15,-95 45,-75 C75,-55 95,-15 75,35 C60,70 25,85 0,85 C-25,85 -60,70 -75,35 C-95,-15 -75,-55 -45,-75 Z" 
            fill="#7C3AED" 
            opacity="0.04" />

      <!-- The Elegant Shopping Bag / Cart Loop -->
      <path d="M-40,-45 C-40,-75 -20,-80 0,-80 C20,-80 40,-75 40,-45" 
            fill="none" 
            stroke="url(#accentGrad)" 
            stroke-width="10" 
            stroke-linecap="round" />

      <!-- Main Cart Body (Geometric, Modern, Sleek) -->
      <path d="M-65,-45 
               L65,-45 
               C75,-45 80,-35 75,-20 
               L55,40 
               C50,55 35,65 15,65 
               L-15,65 
               C-35,65 -50,55 -55,40 
               L-75,-20 
               C-80,-35 -75,-45 -65,-45 Z" 
            fill="url(#cartGrad)" />

      <!-- Dynamic Forward Motion Lines (The E-Commerce "Swift" Element) -->
      <path d="M-30,-15 L20,-15" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.9" />
      <path d="M-40,10 L10,10" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.9" />
      <path d="M-20,35 L30,35" stroke="url(#accentGrad)" stroke-width="8" stroke-linecap="round" />

      <!-- Spark / Online Status Indicator -->
      <circle cx="50" cy="-45" r="9" fill="#10B981" stroke="#FFFFFF" stroke-width="3" />
    </g>

    <!-- TYPOGRAPHY -->
    <g text-anchor="middle">
      <!-- Main App Title -->
      <text x="400" y="425" 
            font-family="system-ui, -apple-system, sans-serif" 
            font-size="52" 
            font-weight="800" 
            letter-spacing="-0.5" 
            fill="#1E1B4B">
        Swift<tspan fill="url(#cartGrad)">Cart</tspan>
      </text>

      <!-- Minimalist Subtitle -->
      <text x="400" y="460" 
            font-family="system-ui, -apple-system, sans-serif" 
            font-size="15" 
            font-weight="600" 
            letter-spacing="4" 
            fill="#94A3B8">
        SHOPPING IN AN INSTANT
      </text>
    </g>
  </g>
</svg>
